services:
  app:
    image: ${SYNC_SEAT_IMAGE:-ghcr.io/your-github-user/sync-seat:latest}
    container_name: sync-seat-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 容器内应用监听端口需与 nginx.conf 的 app:3000 upstream 保持一致。
      SERVER_PORT: 3000
      # 生产同源部署时应设置为 https://你的域名，供 CORS 和 Socket.IO 握手使用。
      WEB_ORIGIN: ${WEB_ORIGIN:-https://example.com}
      # 房主推流按 IPv6 直连、IPv4 NAT 打洞、TURN 中继的顺序尝试连接。
      WEBRTC_STUN_URLS: ${WEBRTC_STUN_URLS:-stun:stun.l.google.com:19302}
      WEBRTC_TURN_URLS: ${WEBRTC_TURN_URLS-}
      WEBRTC_TURN_USERNAME: ${WEBRTC_TURN_USERNAME-}
      WEBRTC_TURN_PASSWORD: ${WEBRTC_TURN_PASSWORD-}
      # Dockerfile 会把 Vue 构建产物复制到该目录，Nest 启动时会自动托管。
      WEB_DIST_PATH: /app/apps/web/dist
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: sync-seat-nginx
    restart: unless-stopped
    depends_on:
      - app
      - acme
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/nginx/certs:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        until [ -f /etc/nginx/certs/fullchain.cer ] && [ -f /etc/nginx/certs/private.key ]; do
          echo "[Init] 等待 acme.sh 写入 HTTPS 证书..."
          sleep 5
        done
        exec nginx -g "daemon off;"

  acme:
    image: neilpang/acme.sh:latest
    container_name: sync-seat-acme
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - Ali_Key=${Ali_Key:?Set Ali_Key in .env for DNS-01 certificate issuance}
      - Ali_Secret=${Ali_Secret:?Set Ali_Secret in .env for DNS-01 certificate issuance}
      - TARGET_DOMAIN=${TARGET_DOMAIN:?Set TARGET_DOMAIN in .env for certificate issuance}
    volumes:
      - ./letsencrypt:/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        apk add --no-cache docker-cli

        issue_cert() {
          domain="$1"
          if [ -z "$domain" ]; then
            return 0
          fi

          if [ ! -f "/acme.sh/fullchain.cer" ]; then
            echo "[Init] 为 ${domain} 申请证书..."
            /usr/local/bin/acme.sh --issue --dns dns_ali -d "${domain}" --server letsencrypt

            echo "[Init] 安装 ${domain} 证书并配置 Nginx 重载钩子..."
            /usr/local/bin/acme.sh --install-cert -d "${domain}" \
              --key-file       /acme.sh/private.key \
              --fullchain-file /acme.sh/fullchain.cer \
              --reloadcmd      "docker exec sync-seat-nginx nginx -s reload || true"
          else
            echo "[Init] ${domain} 证书已存在，跳过首次签发。"
          fi
        }

        issue_cert "$${TARGET_DOMAIN}"

        echo "[Init] 启动 cron 守护进程..."
        exec crond -f

  turn:
    image: coturn/coturn:latest
    container_name: sync-seat-turn
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    command:
      - --listening-port=${TURN_PORT:-3478}
      - --realm=${TURN_REALM:?Set TURN_REALM in .env for TURN authentication}
      - --server-name=${TURN_REALM:?Set TURN_REALM in .env for TURN authentication}
      - --external-ip=${TURN_EXTERNAL_IP:?Set TURN_EXTERNAL_IP in .env to your router public IPv4}
      - --user=${WEBRTC_TURN_USERNAME:?Set WEBRTC_TURN_USERNAME in .env}:${WEBRTC_TURN_PASSWORD:?Set WEBRTC_TURN_PASSWORD in .env}
      - --min-port=49160
      - --max-port=49200
      - --fingerprint
      - --lt-cred-mech
      - --no-cli
      - --no-multicast-peers
