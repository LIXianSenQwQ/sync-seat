services:
  app:
    image: ${SYNC_SEAT_IMAGE}
    container_name: sync-seat-app
    restart: unless-stopped
    depends_on:
      - openlist
    environment:
      # 容器内应用监听端口需与 nginx.conf 的 app:3000 upstream 保持一致。
      SERVER_PORT: ${SERVER_PORT:-3000}
      # 生产同源部署时应设置为 https://你的域名，供 CORS 和 Socket.IO 握手使用。
      WEB_ORIGIN: ${WEB_ORIGIN}
      # AList/OpenList 访问配置只给后端容器使用，前端不会接触这些凭据。
      ALIST_BASE_URL: ${ALIST_BASE_URL}
      ALIST_USERNAME: ${ALIST_USERNAME}
      ALIST_PASSWORD: ${ALIST_PASSWORD}
      ALLOWED_ROOT_PATHS: ${ALLOWED_ROOT_PATHS}
      # 视频房主推流仍按 IPv6 直连、IPv4 NAT 打洞、TURN 中继的顺序尝试；语音强制使用 TURN 中继。
      WEBRTC_STUN_URLS: ${WEBRTC_STUN_URLS:-stun:stun.l.google.com:19302}
      WEBRTC_TURN_URLS: ${WEBRTC_TURN_URLS}
      WEBRTC_TURN_USERNAME: ${WEBRTC_TURN_USERNAME}
      TURN_AUTH_SECRET: ${TURN_AUTH_SECRET}
      TURN_CREDENTIAL_TTL_SECONDS: ${TURN_CREDENTIAL_TTL_SECONDS:-3600}
      # Dockerfile 会把 Vue 构建产物复制到该目录，Nest 启动时会自动托管。
      WEB_DIST_PATH: /app/apps/web/dist
      # 服务端文件日志默认写入 /app/logs，按天轮转后由下方 volume 持久化。
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14d}
      LOG_MAX_FILE_SIZE: ${LOG_MAX_FILE_SIZE:-20m}
    expose:
      - "3000"
    volumes:
      - ./logs:/app/logs

  nginx:
    image: ${NGINX_IMAGE:-docker.1ms.run/nginx:alpine}
    container_name: sync-seat-nginx
    restart: unless-stopped
    depends_on:
      - app
      - acme
    ports:
      - "${NGINX_HTTP_HOST_PORT:-80}:80"
      - "${NGINX_HTTPS_HOST_PORT:-5173}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/nginx/certs:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        until [ -f /etc/nginx/certs/fullchain.cer ] && [ -f /etc/nginx/certs/private.key ]; do
          echo "[Init] 等待 acme.sh 写入 HTTPS 证书..."
          sleep 5
        done
        exec nginx -g "daemon off;"

  acme:
    image: ${ACME_IMAGE:-docker.1panel.live/neilpang/acme.sh:latest}
    container_name: sync-seat-acme
    restart: unless-stopped
    environment:
      # DNS-01 签发所需的真实 AccessKey 只在服务器部署文件里替换，不提交真实值。
      Ali_Key: ${Ali_Key}
      Ali_Secret: ${Ali_Secret}
      TARGET_DOMAIN: ${TARGET_DOMAIN}
    volumes:
      - ./letsencrypt:/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu

        if ! command -v docker >/dev/null 2>&1; then
          apk add --no-cache docker-cli
        fi

        issue_cert() {
          domain="$$1"
          if [ -z "$$domain" ]; then
            return 0
          fi

          if [ ! -f "/acme.sh/fullchain.cer" ] || [ ! -f "/acme.sh/private.key" ]; then
            echo "[Init] 为 $${domain} 申请证书..."
            /usr/local/bin/acme.sh --issue --dns dns_ali -d "$${domain}" --server letsencrypt
          else
            echo "[Init] $${domain} 证书已存在，跳过首次签发。"
          fi

          echo "[Init] 安装 $${domain} 证书并配置 Nginx 重载钩子..."
          /usr/local/bin/acme.sh --install-cert -d "$${domain}" \
            --key-file       /acme.sh/private.key \
            --fullchain-file /acme.sh/fullchain.cer \
            --reloadcmd      "docker exec sync-seat-nginx nginx -s reload || true"
        }

        issue_cert "$${TARGET_DOMAIN}"

        echo "[Init] 启动 acme.sh 续期循环..."
        while true; do
          /usr/local/bin/acme.sh --cron --home /acme.sh || true
          sleep 12h
        done

  turn:
    image: ${COTURN_IMAGE:-docker.1panel.live/coturn/coturn:latest}
    container_name: sync-seat-turn
    restart: unless-stopped
    # TURN 不是 HTTP 服务，不经过 nginx；宿主机需放行 3478/tcp、3478/udp 和 49160-49200/udp。
    network_mode: host
    environment:
      TURN_PORT: ${TURN_PORT:-3478}
      TURN_REALM: ${TURN_REALM}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP}
      TURN_AUTH_SECRET: ${TURN_AUTH_SECRET}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        exec turnserver \
          --listening-port="$${TURN_PORT}" \
          --realm="$${TURN_REALM}" \
          --server-name="$${TURN_REALM}" \
          --external-ip="$${TURN_EXTERNAL_IP}" \
          --use-auth-secret \
          --static-auth-secret="$${TURN_AUTH_SECRET}" \
          --min-port=49160 \
          --max-port=49200 \
          --fingerprint \
          --lt-cred-mech \
          --no-cli \
          --no-multicast-peers

  openlist:
    image: ${OPENLIST_IMAGE:-docker.1ms.run/openlistteam/openlist:beta-aio}
    container_name: openlist
    restart: unless-stopped
    user: "${OPENLIST_PUID:-0}:${OPENLIST_PGID:-0}"
    ports:
      - "${OPENLIST_HOST_PORT:-5244}:5244"
    environment:
      OPLISTDX_PUID: ${OPENLIST_PUID:-0}
      OPLISTDX_PGID: ${OPENLIST_PGID:-0}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./openlist:/opt/openlist/data
