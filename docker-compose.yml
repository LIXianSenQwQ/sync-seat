services:
  app:
    image: ghcr.io/lixiansenqwq/sync-seat:latest
    container_name: sync-seat-app
    restart: unless-stopped
    environment:
      # 容器内应用监听端口需与 nginx.conf 的 app:3000 upstream 保持一致。
      SERVER_PORT: "3000"
      # 生产同源部署时应设置为 https://你的域名，供 CORS 和 Socket.IO 握手使用。
      WEB_ORIGIN: https://api.91since.com
      # AList/OpenList 访问配置只给后端容器使用，前端不会接触这些凭据。
      ALIST_BASE_URL: https://alist.example.com
      ALIST_USERNAME: admin
      ALIST_PASSWORD: replace-with-alist-password
      ALLOWED_ROOT_PATHS: /Movies,/Shows
      # 房主推流按 IPv6 直连、IPv4 NAT 打洞、TURN 中继的顺序尝试连接。
      WEBRTC_STUN_URLS: stun:stun.l.google.com:19302
      WEBRTC_TURN_URLS: turn:api.91since.com:3478?transport=udp,turn:api.91since.com:3478?transport=tcp
      WEBRTC_TURN_USERNAME: sync-seat
      WEBRTC_TURN_PASSWORD: replace-with-strong-turn-password
      # Dockerfile 会把 Vue 构建产物复制到该目录，Nest 启动时会自动托管。
      WEB_DIST_PATH: /app/apps/web/dist
    expose:
      - "3000"

  nginx:
    image: docker.1ms.run/nginx:alpine
    container_name: sync-seat-nginx
    restart: unless-stopped
    depends_on:
      - app
      - acme
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./letsencrypt:/etc/nginx/certs:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        until [ -f /etc/nginx/certs/fullchain.cer ] && [ -f /etc/nginx/certs/private.key ]; do
          echo "[Init] 等待 acme.sh 写入 HTTPS 证书..."
          sleep 5
        done
        exec nginx -g "daemon off;"

  acme:
    image: docker.1panel.live/neilpang/acme.sh:latest
    container_name: sync-seat-acme
    restart: unless-stopped
    environment:
      # DNS-01 签发所需的真实 AccessKey 只在服务器部署文件里替换，不提交真实值。
      Ali_Key: replace-with-ali-key
      Ali_Secret: replace-with-ali-secret
      TARGET_DOMAIN: api.91since.com
    volumes:
      - ./letsencrypt:/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu

        if ! command -v docker >/dev/null 2>&1; then
          apk add --no-cache docker-cli
        fi

        issue_cert() {
          domain="$$1"
          if [ -z "$$domain" ]; then
            return 0
          fi

          if [ ! -f "/acme.sh/fullchain.cer" ] || [ ! -f "/acme.sh/private.key" ]; then
            echo "[Init] 为 $${domain} 申请证书..."
            /usr/local/bin/acme.sh --issue --dns dns_ali -d "$${domain}" --server letsencrypt
          else
            echo "[Init] $${domain} 证书已存在，跳过首次签发。"
          fi

          echo "[Init] 安装 $${domain} 证书并配置 Nginx 重载钩子..."
          /usr/local/bin/acme.sh --install-cert -d "$${domain}" \
            --key-file       /acme.sh/private.key \
            --fullchain-file /acme.sh/fullchain.cer \
            --reloadcmd      "docker exec sync-seat-nginx nginx -s reload || true"
        }

        issue_cert "$${TARGET_DOMAIN}"

        echo "[Init] 启动 acme.sh 续期循环..."
        while true; do
          /usr/local/bin/acme.sh --cron --home /acme.sh || true
          sleep 12h
        done

  turn:
    image: docker.1panel.live/coturn/coturn:latest
    container_name: sync-seat-turn
    restart: unless-stopped
    # TURN 不是 HTTP 服务，不经过 nginx；宿主机需放行 3478/tcp、3478/udp 和 49160-49200/udp。
    network_mode: host
    environment:
      TURN_PORT: "3478"
      TURN_REALM: api.91since.com
      TURN_EXTERNAL_IP: 203.0.113.10
      WEBRTC_TURN_USERNAME: sync-seat
      WEBRTC_TURN_PASSWORD: replace-with-strong-turn-password
    entrypoint: /bin/sh
    command:
      - -c
      - |
        exec turnserver \
          --listening-port="$${TURN_PORT}" \
          --realm="$${TURN_REALM}" \
          --server-name="$${TURN_REALM}" \
          --external-ip="$${TURN_EXTERNAL_IP}" \
          --user="$${WEBRTC_TURN_USERNAME}:$${WEBRTC_TURN_PASSWORD}" \
          --min-port=49160 \
          --max-port=49200 \
          --fingerprint \
          --lt-cred-mech \
          --no-cli \
          --no-multicast-peers
